name: Release

on:
  push:
    tags:
      - 'v*'

# OIDC for npm trusted publishing; contents:write for GitHub Release (default GITHUB_TOKEN).
permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # npm publish uses package.json "version", not the git tag — catch mismatches before publishing.
      - name: Verify package.json version matches tag
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::package.json version is $PKG_VER but tag is $GITHUB_REF_NAME (expected $TAG_VER in package.json)"
            exit 1
          fi

      # Trusted publishing requires Node >= 22.14 and npm CLI >= 11.5.1 (see npm docs).
      # Use Node 24.x: it bundles npm 11.x. Avoid `npm install -g npm@…` — that can corrupt
      # the global npm on runners (e.g. MODULE_NOT_FOUND: promise-retry).
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Verify npm >= 11.5.1 (trusted publishing)
        run: |
          set -e
          NPM_VER=$(npm --version)
          echo "npm version: $NPM_VER"
          node -e "
            const v = process.argv[1].split(/[.-]/).map(Number);
            const ok = v[0] > 11 || (v[0] === 11 && (v[1] > 5 || (v[1] === 5 && (v[2] || 0) >= 1)));
            if (!ok) { console.error('npm must be >= 11.5.1 for trusted publishing, got ' + process.argv[1]); process.exit(1); }
          " "$NPM_VER"

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Publish to npm
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
